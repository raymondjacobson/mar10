<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <title>Super Mario Bros — Audius Edition</title>
    <meta name="description" content="Mario clone with Audius background music">
    <meta name="viewport" content="width=device-width">
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <link rel="stylesheet" href="css/game.css">
  </head>
  <body>
    <!-- HUD overlay -->
    <div class="info">
      <p class="controls">Move: &#8592;&#8594; &nbsp;|&nbsp; Jump: &#8593; / X &nbsp;|&nbsp; Run: Z</p>
      <p id="now-playing" class="now-playing">&#9835; Loading tracks&hellip;</p>
      <div class="links">
        <a href="https://openaudio.org" target="_blank" rel="noopener">Powered by Open Audio</a>
        <span class="hide-mobile">&nbsp;|&nbsp;<a href="https://github.com/raymondjacobson/mar10" target="_blank" rel="noopener">GitHub</a></span>
      </div>
    </div>

    <!-- Game scripts — order matters -->
    <script src="js/util.js"></script>
    <script src="js/input.js"></script>
    <script src="js/resources.js"></script>
    <script src="js/sprite.js"></script>
    <script src="js/entity.js"></script>
    <script src="js/pipe.js"></script>
    <script src="js/mushroom.js"></script>
    <script src="js/fireflower.js"></script>
    <script src="js/star.js"></script>
    <script src="js/fireball.js"></script>
    <script src="js/coin.js"></script>
    <script src="js/bcoin.js"></script>
    <script src="js/goomba.js"></script>
    <script src="js/koopa.js"></script>
    <script src="js/floor.js"></script>
    <script src="js/block.js"></script>
    <script src="js/rubble.js"></script>
    <script src="js/prop.js"></script>
    <script src="js/player.js"></script>
    <script src="js/flag.js"></script>
    <script src="js/levels/level.js"></script>
    <script src="js/levels/11.js"></script>
    <script src="js/levels/11tunnel.js"></script>
    <script src="js/audius.js"></script>
    <script src="js/game.js"></script>
  </body>
</html>
