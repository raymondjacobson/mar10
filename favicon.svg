<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" shape-rendering="crispEdges">
  <!-- hat -->
  <rect x="4" y="0" width="3" height="1" fill="#7f6ad6"/>
  <rect x="3" y="1" width="5" height="1" fill="#7f6ad6"/>
  <!-- hair + hat brim -->
  <rect x="2" y="2" width="3" height="1" fill="#5c3317"/>
  <rect x="5" y="2" width="3" height="1" fill="#ffa882"/>
  <!-- face row 1 -->
  <rect x="2" y="3" width="1" height="1" fill="#5c3317"/>
  <rect x="3" y="3" width="4" height="1" fill="#ffa882"/>
  <rect x="7" y="3" width="1" height="1" fill="#5c3317"/>
  <!-- face row 2 -->
  <rect x="2" y="4" width="6" height="1" fill="#ffa882"/>
  <!-- mustache -->
  <rect x="2" y="5" width="1" height="1" fill="#5c3317"/>
  <rect x="3" y="5" width="2" height="1" fill="#ffa882"/>
  <rect x="5" y="5" width="3" height="1" fill="#5c3317"/>
  <!-- shirt -->
  <rect x="3" y="6" width="4" height="1" fill="#7f6ad6"/>
  <rect x="2" y="7" width="1" height="1" fill="#7f6ad6"/>
  <rect x="3" y="7" width="3" height="1" fill="#3355cc"/>
  <rect x="6" y="7" width="2" height="1" fill="#7f6ad6"/>
  <!-- body -->
  <rect x="1" y="8" width="2" height="1" fill="#7f6ad6"/>
  <rect x="3" y="8" width="4" height="1" fill="#3355cc"/>
  <rect x="7" y="8" width="2" height="1" fill="#7f6ad6"/>
  <rect x="1" y="9" width="2" height="1" fill="#7f6ad6"/>
  <rect x="3" y="9" width="4" height="1" fill="#3355cc"/>
  <rect x="7" y="9" width="2" height="1" fill="#7f6ad6"/>
  <!-- lower body -->
  <rect x="2" y="10" width="1" height="1" fill="#7f6ad6"/>
  <rect x="3" y="10" width="4" height="1" fill="#3355cc"/>
  <rect x="7" y="10" width="1" height="1" fill="#7f6ad6"/>
  <!-- legs -->
  <rect x="2" y="11" width="2" height="1" fill="#3355cc"/>
  <rect x="4" y="11" width="1" height="1" fill="#5c3317"/>
  <rect x="5" y="11" width="3" height="1" fill="#3355cc"/>
  <!-- shoes -->
  <rect x="2" y="12" width="3" height="1" fill="#5c3317"/>
  <rect x="6" y="12" width="3" height="1" fill="#5c3317"/>
  <rect x="1" y="13" width="4" height="1" fill="#5c3317"/>
  <rect x="6" y="13" width="4" height="1" fill="#5c3317"/>
</svg>
